    # PostgreSQL Database
    postgres:
        image: postgres:17-alpine
        container_name: travel_booking_app_postgres_db
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_USER=root
            - POSTGRES_PASSWORD=root
            - POSTGRES_DB=travel_booking_app_db
        volumes:
            - travel_booking_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U root -d travel_booking_app_db"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - travel-booking-app-network
        restart: unless-stopped

    # Redis Cache
    redis:
        image: redis:alpine3.22
        container_name: travel_booking_app_redis_cache
        command: redis-server --appendonly yes
        volumes:
            - travel_booking_redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        ports:
            - "6379:6379"
        networks:
            - travel-booking-app-network
        restart: unless-stopped

# Networks
networks:
    travel-booking-app-network:
        driver: bridge

# Volumes
volumes:
    travel_booking_postgres_data:
        driver: local
    travel_booking_redis_data:
        driver: local
