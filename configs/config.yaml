app:
  name: "Project Management Backend"
  version: "1.0.0"
  environment: "development"

server:
  host: "localhost"
  port: "8080"
  read_timeout: 30
  write_timeout: 30

database:
  driver: "mysql"
  host: "localhost"
  port: 3306
  username: "root"
  password: "password"
  database: "project_management"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 60

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "your-super-secret-jwt-key-here"
  expiration: 24
